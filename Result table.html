<html>

<head>
    <title>Result Table</title>
    <style>
        body {
            font-family: Arial;
        }

        table {
            border-collapse: collapse;
            width: 500px;
            text-align: center;
        }

        th,
        td {
            border: 2px solid black;
            padding: 8px;
        }

        th {
            font-weight: bold;
        }

        .message {
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>

<body>
    <table>
        <tr>
            <th rowspan="2">Subject</th>
            <th colspan="4">Obtained Marks</th>
        </tr>
        <tr>
            <th>Written</th>
            <th>MCQ</th>
            <th>Practical</th>
            <th>Total</th>
        </tr>
        <tr>
            <td>ICT</td>
            <td>38</td>
            <td>22</td>
            <td>22</td>
            <td>82</td>
        </tr>
        <tr>
            <td colspan="5" class="message">
                Congratulations! You Have Passed
            </td>
        </tr>
    </table>
</body>

</html>
